name: Build StudyGate APK V2

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Rebuild Android project folders
        run: |
          mkdir -p app/src/main/java/com/example/studygate
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          cp AndroidManifest.xml app/src/main/AndroidManifest.xml
          cp MainActivity.kt app/src/main/java/com/example/studygate/MainActivity.kt
          cp BlockedActivity.kt app/src/main/java/com/example/studygate/BlockedActivity.kt
          cp StudyPrefs.kt app/src/main/java/com/example/studygate/StudyPrefs.kt
          cp YouTubeBlockAccessibilityService.kt app/src/main/java/com/example/studygate/YouTubeBlockAccessibilityService.kt

          cp activity_main.xml app/src/main/res/layout/activity_main.xml
          cp activity_blocked.xml app/src/main/res/layout/activity_blocked.xml
          cp strings.xml app/src/main/res/values/strings.xml
          cp styles.xml app/src/main/res/values/styles.xml
          cp accessibility_service_config.xml app/src/main/res/xml/accessibility_service_config.xml

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "StudyGate"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
              id("org.jetbrains.kotlin.android") version "2.0.21" apply false
          }
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.example.studygate"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.example.studygate"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.activity:activity-ktx:1.9.0")
              implementation("androidx.media3:media3-exoplayer:1.3.1")
              implementation("androidx.media3:media3-ui:1.3.1")
          }
          EOF

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudyGate-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
